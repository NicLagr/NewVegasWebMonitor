name: Build Android APK

on:
  push:
    branches:
      - main

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      # The world map is now a single committed image (public/mojave-map.png),
      # so no Deep-Zoom tile download is needed.

      - name: Build and sync Capacitor Android assets
        # LIVE build: connects to the FNVWebSocket plugin over ws:// (cleartext is
        # enabled in capacitor.config.ts). To make an offline demo APK instead, add
        #   env: { VITE_USE_FIXTURES: 'true' }
        run: npm run cap:sync:android

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: newvegaswebmonitor-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error